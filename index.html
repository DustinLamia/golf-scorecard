<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VoiceScore</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --green:#2d5a27;--cream:#f5f0e8;--tan:#d4c9b0;--dark:#1a1a1a;--red:#c0392b;--blue:#2980b9;--gold:#c9a84c; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--green);min-height:100vh;color:var(--cream);background-image:radial-gradient(ellipse at 20% 50%,rgba(74,140,65,.4) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(45,90,39,.6) 0%,transparent 50%);}
  header{text-align:center;padding:24px 20px 12px;}
  header h1{font-family:'Bebas Neue',cursive;font-size:clamp(2.4rem,8vw,3.5rem);letter-spacing:4px;color:var(--cream);text-shadow:2px 2px 0 rgba(0,0,0,.3);}
  header p{font-size:.75rem;color:var(--tan);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
  #setup-screen{padding:20px;max-width:500px;margin:0 auto;}
  .setup-card{background:rgba(245,240,232,.1);backdrop-filter:blur(10px);border:1px solid rgba(245,240,232,.2);border-radius:16px;padding:24px;margin-bottom:16px;position:relative;z-index:1;}
  .setup-card:first-child{z-index:10;}
  .setup-card h2{font-family:'Bebas Neue',cursive;font-size:1.4rem;letter-spacing:2px;margin-bottom:16px;color:var(--gold);}
  .player-inputs{display:flex;flex-direction:column;gap:10px;}
  .player-input-row{display:flex;align-items:center;gap:10px;}
  .player-input-row span{width:28px;height:28px;background:var(--gold);color:var(--dark);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex-shrink:0;}
  input[type="text"],input[type="number"]{flex:1;background:rgba(0,0,0,.25);border:1px solid rgba(245,240,232,.25);border-radius:8px;padding:10px 14px;color:var(--cream);font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s;}
  input[type="text"]:focus,input[type="number"]:focus{border-color:var(--gold);}
  input::placeholder{color:rgba(245,240,232,.4);}
  .course-search-row{display:flex;gap:8px;position:relative;}
  .course-search-row input{flex:1;}
  .btn-search{padding:10px 16px;background:var(--gold);border:none;border-radius:8px;color:var(--dark);font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;}
  .course-results:empty{display:none;}
  .course-results{position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:1000;display:flex;flex-direction:column;gap:0;max-height:300px;overflow-y:auto;background:#1e3d1a;border:1px solid rgba(201,168,76,.35);border-radius:10px;box-shadow:0 12px 40px rgba(0,0,0,.7);}
  .course-item{padding:11px 14px;background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,.07);cursor:pointer;transition:background .12s;text-align:left;}
  .course-item:last-child{border-bottom:none;}
  .course-item:hover,.course-item.selected{background:rgba(201,168,76,.2);}
  .course-item .cn{font-size:.9rem;font-weight:600;color:#f5f0e8;}
  .course-item .cl{font-size:.73rem;color:#b8a88a;margin-top:3px;}
  .search-status{font-size:.78rem;color:var(--tan);margin-top:6px;min-height:18px;}
  .tee-selector{margin-top:12px;}
  .tee-selector label{font-size:.8rem;color:var(--tan);display:block;margin-bottom:6px;}
  .tee-btns{display:flex;gap:6px;flex-wrap:wrap;}
  .tee-btn{padding:6px 14px;border-radius:6px;border:1px solid rgba(245,240,232,.3);background:transparent;color:var(--cream);font-size:.8rem;cursor:pointer;transition:all .15s;}
  .tee-btn.active{background:var(--gold);border-color:var(--gold);color:var(--dark);font-weight:600;}
  .selected-badge{margin-top:10px;padding:10px 14px;background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);border-radius:8px;font-size:.85rem;color:var(--gold);}
  .holes-row{display:flex;gap:12px;align-items:center;}
  .holes-row label{font-size:.85rem;color:var(--tan);flex:1;}
  .holes-btn-group{display:flex;gap:8px;}
  .holes-btn{padding:8px 18px;border-radius:8px;border:1px solid rgba(245,240,232,.3);background:transparent;color:var(--cream);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.9rem;transition:all .2s;}
  .holes-btn.active{background:var(--gold);border-color:var(--gold);color:var(--dark);font-weight:600;}
  .btn-start{width:100%;padding:16px;background:var(--gold);border:none;border-radius:12px;font-family:'Bebas Neue',cursive;font-size:1.4rem;letter-spacing:3px;color:var(--dark);cursor:pointer;box-shadow:0 4px 20px rgba(201,168,76,.4);margin-top:8px;}
  #scorecard-screen{display:none;padding:12px;}
  .course-banner{text-align:center;margin-bottom:8px;}
  .course-banner h3{font-family:'Bebas Neue',cursive;font-size:1.2rem;letter-spacing:2px;color:var(--gold);}
  .course-banner p{font-size:.7rem;color:var(--tan);text-transform:uppercase;letter-spacing:1px;}
  .voice-section{display:flex;flex-direction:column;align-items:center;padding:16px 0 12px;}
  .voice-btn{width:80px;height:80px;border-radius:50%;border:3px solid var(--cream);background:rgba(245,240,232,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(10px);}
  .voice-btn svg{width:32px;height:32px;fill:var(--cream);}
  .voice-btn.listening{background:rgba(192,57,43,.3);border-color:var(--red);animation:pulse-ring 1.2s ease-out infinite;}
  .voice-btn.listening svg{fill:var(--red);}
  @keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(192,57,43,.5);}70%{box-shadow:0 0 0 20px rgba(192,57,43,0);}100%{box-shadow:0 0 0 0 rgba(192,57,43,0);}}
  .voice-hint{margin-top:10px;font-size:.75rem;color:var(--tan);text-align:center;letter-spacing:1px;text-transform:uppercase;max-width:260px;}
  .voice-transcript{margin-top:8px;font-size:.85rem;color:var(--cream);text-align:center;min-height:20px;font-style:italic;opacity:.8;padding:0 20px;}
  .voice-feedback{margin-top:6px;font-size:.8rem;text-align:center;min-height:18px;padding:0 20px;color:var(--gold);font-weight:500;}
  .scorecard-wrapper{overflow-x:auto;border-radius:12px;background:rgba(0,0,0,.25);backdrop-filter:blur(10px);border:1px solid rgba(245,240,232,.15);}
  table{width:100%;border-collapse:collapse;min-width:520px;font-size:.82rem;}
  thead tr{background:rgba(0,0,0,.3);}
  th{padding:8px 5px;text-align:center;font-family:'Bebas Neue',cursive;letter-spacing:1px;font-size:.9rem;color:var(--gold);border-bottom:1px solid rgba(245,240,232,.15);}
  th:first-child{text-align:left;padding-left:12px;min-width:85px;}
  td{padding:6px 5px;text-align:center;border-bottom:1px solid rgba(245,240,232,.08);color:var(--cream);}
  td:first-child{text-align:left;padding-left:12px;font-weight:500;white-space:nowrap;}
  tr:last-child td{border-bottom:none;}
  .yardage-row td{color:var(--tan);font-size:.72rem;background:rgba(0,0,0,.1);}
  .score-cell{min-width:34px;}
  .score-cell input{width:30px;height:30px;background:rgba(255,255,255,.1);border:1px solid rgba(245,240,232,.2);border-radius:6px;text-align:center;color:var(--cream);font-size:.88rem;font-family:'DM Sans',sans-serif;outline:none;padding:0;transition:all .15s;}
  .score-cell input:focus{border-color:var(--gold);background:rgba(201,168,76,.15);}
  .score-cell input.eagle{background:rgba(201,168,76,.4);border-color:var(--gold);color:var(--gold);font-weight:700;}
  .score-cell input.birdie{background:rgba(41,128,185,.35);border-color:var(--blue);}
  .score-cell input.par{background:rgba(255,255,255,.08);}
  .score-cell input.bogey{background:rgba(192,57,43,.25);border-color:rgba(192,57,43,.5);}
  .score-cell input.double{background:rgba(192,57,43,.45);border-color:var(--red);}
  .total-col{font-family:'Bebas Neue',cursive;font-size:1rem;letter-spacing:1px;}
  .total-row td{background:rgba(0,0,0,.3);font-family:'Bebas Neue',cursive;font-size:1rem;letter-spacing:1px;color:var(--gold);padding-top:10px;padding-bottom:10px;}
  .plus-minus{font-size:.65rem;color:var(--tan);display:block;font-family:'DM Sans',sans-serif;font-weight:400;letter-spacing:0;}
  .hole-header.current{color:var(--cream)!important;}
  .hole-header.current::after{content:'▼';display:block;font-size:.5rem;color:var(--gold);margin-top:-2px;}
  .bottom-controls{display:flex;gap:10px;padding:16px 0 8px;justify-content:center;}
  .btn-sm{padding:10px 20px;border-radius:8px;border:1px solid rgba(245,240,232,.3);background:rgba(245,240,232,.1);color:var(--cream);font-family:'DM Sans',sans-serif;font-size:.85rem;cursor:pointer;}
  .btn-sm.danger{border-color:rgba(192,57,43,.5);color:rgba(192,57,43,.8);}
  .legend{display:flex;gap:12px;justify-content:center;padding:8px 0 16px;flex-wrap:wrap;}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:.7rem;color:var(--tan);text-transform:uppercase;letter-spacing:1px;}
  .legend-dot{width:10px;height:10px;border-radius:2px;}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;padding:20px;}
  .overlay.show{display:flex;}
  .overlay-card{background:#2a4a25;border:1px solid rgba(201,168,76,.4);border-radius:16px;padding:28px 24px;max-width:340px;width:100%;text-align:center;}
  .overlay-card h3{font-family:'Bebas Neue',cursive;font-size:1.6rem;letter-spacing:2px;margin-bottom:10px;color:var(--gold);}
  .overlay-card p{font-size:.85rem;color:var(--tan);margin-bottom:6px;}
  .scores-confirm{background:rgba(0,0,0,.3);border-radius:8px;padding:12px;margin:14px 0;text-align:left;}
  .scores-confirm p{color:var(--cream);font-size:.9rem;margin-bottom:4px;}
  .overlay-buttons{display:flex;gap:10px;margin-top:16px;}
  .overlay-buttons button{flex:1;padding:12px;border-radius:8px;border:none;cursor:pointer;font-family:'Bebas Neue',cursive;font-size:1.1rem;letter-spacing:2px;}
  .btn-confirm{background:var(--gold);color:var(--dark);}
  .btn-cancel{background:rgba(255,255,255,.1);color:var(--cream);border:1px solid rgba(255,255,255,.2)!important;}
  @media(max-width:400px){header h1{font-size:2rem;}}
</style>
</head>
<body>
<header>
  <h1>VoiceScore</h1>
  <p>Golf Scorecard &middot; Hands Free</p>
</header>

<div id="setup-screen">
  <div class="setup-card">
    <h2>Course</h2>
    <div class="course-search-row">
      <input type="text" id="course-input" placeholder="Search course name or city..." oninput="debouncedSearch()" onkeydown="if(event.key==='Enter'){clearTimeout(searchTimer);searchCourse();}">
      <button class="btn-search" onclick="searchCourse()">Search</button>
      <div class="course-results" id="course-results"></div>
    </div>
    <div class="search-status" id="search-status"></div>
    <div id="tee-section" style="display:none">
      <div class="tee-selector">
        <label>Select Tee:</label>
        <div class="tee-btns" id="tee-btns"></div>
      </div>
    </div>
    <div id="selected-badge" class="selected-badge" style="display:none"></div>
  </div>

  <div class="setup-card">
    <h2>Players</h2>
    <div class="player-inputs">
      <div class="player-input-row"><span>1</span><input type="text" placeholder="Player 1 name" class="player-name"></div>
      <div class="player-input-row"><span>2</span><input type="text" placeholder="Player 2 name (optional)" class="player-name"></div>
      <div class="player-input-row"><span>3</span><input type="text" placeholder="Player 3 name (optional)" class="player-name"></div>
      <div class="player-input-row"><span>4</span><input type="text" placeholder="Player 4 name (optional)" class="player-name"></div>
    </div>
  </div>

  <div class="setup-card">
    <h2>Holes</h2>
    <div class="holes-row">
      <label>How many holes?</label>
      <div class="holes-btn-group">
        <button class="holes-btn active" data-holes="9">9</button>
        <button class="holes-btn" data-holes="18">18</button>
      </div>
    </div>
  </div>

  <button class="btn-start" onclick="startRound()">Start Round</button>
</div>

<div id="scorecard-screen">
  <div class="course-banner" id="course-banner" style="display:none">
    <h3 id="banner-name"></h3>
    <p id="banner-detail"></p>
  </div>
  <div class="voice-section">
    <button class="voice-btn" id="voice-btn" onclick="toggleListening()">
      <svg viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1.5 4v6a1.5 1.5 0 0 0 3 0V5a1.5 1.5 0 0 0-3 0zM5 10a1 1 0 0 1 1 1 6 6 0 0 0 12 0 1 1 0 0 1 2 0 8 8 0 0 1-7 7.93V21h2a1 1 0 0 1 0 2H9a1 1 0 0 1 0-2h2v-2.07A8 8 0 0 1 4 11a1 1 0 0 1 1-1z"/></svg>
    </button>
    <div class="voice-hint" id="voice-hint">Say <strong style="color:var(--gold)">"Hey VoiceScore"</strong> or tap mic</div>
    <div style="font-size:.68rem;color:var(--tan);margin-top:4px;text-align:center;letter-spacing:.5px;" id="wake-status">&#127908; Wake word active</div>
    <div class="voice-transcript" id="voice-transcript"></div>
    <div class="voice-feedback" id="voice-feedback"></div>
  </div>
  <div class="scorecard-wrapper">
    <table>
      <thead><tr id="header-row"><th>Player</th></tr></thead>
      <tbody id="score-body"></tbody>
      <tfoot><tr class="total-row" id="total-row"><td>Total</td></tr></tfoot>
    </table>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:rgba(201,168,76,.5)"></div>Eagle</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(41,128,185,.5)"></div>Birdie</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(255,255,255,.15)"></div>Par</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(192,57,43,.35)"></div>Bogey+</div>
  </div>
  <div class="bottom-controls">
    <button class="btn-sm" onclick="exportScores()">Export</button>
    <button class="btn-sm danger" onclick="confirmReset()">New Round</button>
  </div>
</div>

<div class="overlay" id="confirm-overlay">
  <div class="overlay-card">
    <h3>Confirm Scores</h3>
    <p id="overlay-subtitle"></p>
    <div class="scores-confirm" id="overlay-scores"></div>
    <div class="overlay-buttons">
      <button class="btn-cancel" onclick="closeOverlay()">Redo</button>
      <button class="btn-confirm" onclick="applyScores()">Yes, Save</button>
    </div>
  </div>
</div>

function levenshtein(a,b){
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
  for(let j=0;j<=n;j++)dp[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function fuzzyMatch(query,course){
  const q=query.toLowerCase().trim();
  const name=(course.name||'').toLowerCase();
  const city=(course.city||'').toLowerCase();
  const state=(course.state||'').toLowerCase();
  const nameWords=name.split(/\s+/);
  const cityWords=city.split(/\s+/);
  const allWords=[...nameWords,...cityWords];
  // ONLY match on word boundaries — 'ven' must start a word, not appear mid-word
  if(allWords.some(w=>w.startsWith(q)))return 0;
  // Short queries (under 4 chars): prefix-only, no fuzzy, no substring
  if(q.length<4)return 999;
  // Longer queries: full name/city substring OK (e.g. 'netian' in 'Venetian')
  if(name.includes(q)||city.includes(q))return 1;
  // Word-by-word fuzzy for typos
  const qWords=q.split(/\s+/);
  let totalDist=0;
  for(const qw of qWords){
    if(qw.length<2)continue;
    const best=Math.min(...allWords.map(tw=>levenshtein(qw,tw.substring(0,qw.length+2))));
    const threshold=Math.floor(qw.length/4)+1;
    if(best>threshold)return 999;
    totalDist+=best;
  }
  return totalDist;
}

async function searchCourse(){
  const query=document.getElementById('course-input').value.trim();
  const status=document.getElementById('search-status');
  const results=document.getElementById('course-results');
  results.innerHTML='';
  document.getElementById('tee-section').style.display='none';
  document.getElementById('selected-badge').style.display='none';
  if(!query){status.textContent='Type a course name and hit Search';return;}

  // First check local database
  const localMatches=COURSES
    .map(c=>({course:c,score:fuzzyMatch(query,c)}))
    .filter(x=>x.score<999)
    .sort((a,b)=>a.score-b.score)
    .map(x=>x.course);

  // Show local results immediately
  if(localMatches.length){
    status.textContent='Searching...';
    localMatches.forEach(course=>{
      const div=document.createElement('div');
      div.className='course-item';
      div.innerHTML='<div class="cn">'+course.name+'</div><div class="cl">'+course.city+(course.state?', '+course.state:'')+' &middot; '+course.tees[0].pars.length+' holes &middot; <span style="color:var(--gold);font-size:.7rem">&#9733; Local</span></div>';
      div.onclick=()=>selectCourse(course,div);
      results.appendChild(div);
    });
  }

  // Then fetch from API
  status.textContent='&#8987; Searching courses...';
  try {
    const resp=await fetch(API_BASE+'/search?search_query='+encodeURIComponent(query)+'&per_page=20',{
      headers:{'Authorization':'Key '+API_KEY}
    });
    const data=await resp.json();
    const apiCourses=(data.courses||[]).filter(c=>c.location?.country==='United States');

    // Remove duplicates vs local results
    const localNames=new Set(localMatches.map(c=>c.name.toLowerCase()));
    const newFromApi=apiCourses.filter(c=>!localNames.has(c.course_name.toLowerCase()));

    const total=localMatches.length+newFromApi.length;
    if(!total){status.textContent='No matches found. Try a different name or city.';return;}
    status.textContent=total+' course'+(total!==1?'s':'')+' found';

    newFromApi.forEach(course=>{
      const div=document.createElement('div');
      div.className='course-item';
      const city=course.location?.city||'';
      const state=course.location?.state||'';
      div.innerHTML='<div class="cn">'+course.course_name+'</div><div class="cl">'+city+(state?', '+state:'')+' &middot; Tap to load scorecard</div>';
      div.onclick=()=>selectApiCourse(course.id,div);
      results.appendChild(div);
    });
  } catch(e){
    if(!localMatches.length) status.textContent='Offline – no matches found. Try "Custom / Local Course".';
    else status.textContent=localMatches.length+' local course'+(localMatches.length!==1?'s':'')+' found (offline)';
  }
}

async function selectApiCourse(id,el){
  document.querySelectorAll('.course-item').forEach(d=>d.classList.remove('selected'));
  el.classList.add('selected');
  el.querySelector('.cl').textContent='Loading scorecard...';
  try {
    const resp=await fetch(API_BASE+'/courses/'+id,{headers:{'Authorization':'Key '+API_KEY}});
    const data=await resp.json();
    const c=data.course;

    // Build tees array from API response, prefer male tees
    const rawTees=[...(c.tees?.male||[]),...(c.tees?.female||[])];
    // Deduplicate by tee name
    const seen=new Set();
    const tees=[];
    rawTees.forEach(t=>{
      const key=t.tee_name+'-'+(t.holes?.length||0);
      if(!seen.has(key)&&t.holes&&t.holes.length>0){
        seen.add(key);
        tees.push({
          name:t.tee_name+' ('+t.total_yards+'y)',
          pars:t.holes.map(h=>h.par),
          yardages:t.holes.map(h=>h.yardage)
        });
      }
    });

    if(!tees.length){
      el.querySelector('.cl').textContent='No scorecard data available';
      return;
    }

    const course={
      name:c.course_name,
      city:c.location?.city||'',
      state:c.location?.state||'',
      tees:tees
    };

    el.querySelector('.cl').textContent=course.city+(course.state?', '+course.state:'')+' · '+tees[0].pars.length+' holes';
    selectCourse(course,el);
  } catch(e){
    el.querySelector('.cl').textContent='Error loading – try again';
    el.classList.remove('selected');
  }
}

function updatePar(hi,val){pars[hi]=parseInt(val)||4;refreshTotals();document.getElementById('par-total').textContent=pars.reduce((a,b)=>a+b,0);}
function manualScore(pi,hi,val){scores[pi][hi]=val?parseInt(val):null;colorScore(pi,hi);refreshTotals();}
function colorScore(pi,hi){
  const inp=document.getElementById('s-'+pi+'-'+hi);
  if(!inp)return;
  const s=scores[pi][hi],par=pars[hi];
  inp.className='';
  if(s===null)return;
  if(s<=par-2)inp.classList.add('eagle');
  else if(s===par-1)inp.classList.add('birdie');
  else if(s===par)inp.classList.add('par');
  else if(s===par+1)inp.classList.add('bogey');
  else inp.classList.add('double');
}
function refreshTotals(){
  players.forEach((_,pi)=>{
    const filled=scores[pi].filter(s=>s!==null);
    const total=filled.length?filled.reduce((a,b)=>a+b,0):null;
    const cell=document.getElementById('total-'+pi);
    if(!cell)return;
    if(total===null){cell.textContent='-';return;}
    const parSoFar=scores[pi].map((s,hi)=>s!==null?pars[hi]:0).reduce((a,b)=>a+b,0);
    const diff=total-parSoFar;
    cell.innerHTML=total+'<span class="plus-minus">'+(diff===0?'E':diff>0?'+'+diff:diff)+'</span>';
  });
}

function setupSpeech(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){document.getElementById('voice-hint').textContent='Use Safari on iPhone or Chrome on Android.';return;}

  // ── Main recognition (score entry) ──
  recognition=new SR();
  recognition.continuous=false;recognition.interimResults=true;recognition.lang='en-US';
  recognition.onresult=(e)=>{
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)final+=e.results[i][0].transcript;else interim+=e.results[i][0].transcript;}
    const display=final||interim;
    document.getElementById('voice-transcript').textContent='"'+fixTranscript(display)+'"';
    if(final){
      // Got a final result — stop mic, parse, resume wake word
      clearTimeout(window._silenceTimer);
      isListening=false;
      recognition.stop();
      setListeningUI(false);
      parseVoice(final);
      setTimeout(()=>{if(wakeActive)try{wakeRecognition.start();}catch(e){}},600);
    }
  };
  recognition.onend=()=>{
    // Only restart if still explicitly listening (e.g. no final result yet came in)
    if(isListening){try{recognition.start();}catch(e){}}
    else{setListeningUI(false);}
  };
  recognition.onerror=(e)=>{if(e.error!=='no-speech')document.getElementById('voice-feedback').textContent='Mic error: '+e.error;};

  // ── Wake word listener ──
  startWakeWord();
}

let wakeRecognition=null,wakeActive=false;
const WAKE_WORD='hey voicescore';
const WAKE_ALTS=['hey voice score','hey voicer','hey voice','okay voicescore','ok voicescore','hey boys score','hey boy score'];

function startWakeWord(){
  const SR2=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR2)return;
  wakeRecognition=new SR2();
  wakeRecognition.continuous=true;
  wakeRecognition.interimResults=true;
  wakeRecognition.lang='en-US';
  wakeActive=true;
  wakeRecognition.onresult=(e)=>{
    if(isListening)return; // already listening for scores
    let text='';
    for(let i=e.resultIndex;i<e.results.length;i++) text+=e.results[i][0].transcript;
    text=text.toLowerCase().trim();
    const triggered=[WAKE_WORD,...WAKE_ALTS].some(w=>text.includes(w));
    if(triggered){
      document.getElementById('voice-feedback').textContent='';
      toggleListening();
    }
  };
  wakeRecognition.onend=()=>{if(wakeActive&&!isListening){try{wakeRecognition.start();}catch(e){}}};
  wakeRecognition.onerror=(e)=>{if(e.error!=='no-speech'&&e.error!=='aborted'){wakeActive=false;}};
  try{wakeRecognition.start();}catch(e){}
}

function stopWakeWord(){
  wakeActive=false;
  if(wakeRecognition)try{wakeRecognition.stop();}catch(e){}
}

function toggleListening(){
  if(!recognition)return;
  // Pause wake word while actively listening for scores
  if(wakeRecognition&&!isListening)try{wakeRecognition.stop();}catch(e){}
  if(isListening){
    isListening=false;recognition.stop();setListeningUI(false);
    // Resume wake word after short delay
    setTimeout(()=>{if(wakeActive)try{wakeRecognition.start();}catch(e){}},500);
  } else {
    isListening=true;setListeningUI(true);
    try{recognition.start();}catch(e){}
    // Auto-stop after 8 seconds of silence
    clearTimeout(window._silenceTimer);
    window._silenceTimer=setTimeout(()=>{
      if(isListening){
        isListening=false;
        try{recognition.stop();}catch(e){}
        setListeningUI(false);
        document.getElementById('voice-feedback').textContent='Mic timed out — say "Hey VoiceScore" to start again';
        setTimeout(()=>{document.getElementById('voice-feedback').textContent='';},3000);
        setTimeout(()=>{if(wakeActive)try{wakeRecognition.start();}catch(e){}},600);
      }
    },8000);
  }
}
function setListeningUI(on){
  const btn=document.getElementById('voice-btn'),hint=document.getElementById('voice-hint');
  if(on){btn.classList.add('listening');hint.textContent='Listening... say "Dustin birdie, Scott bogey"';}
  else{btn.classList.remove('listening');hint.textContent='Tap mic \u00b7 Say "Dustin birdie, Scott bogey"';document.getElementById('voice-transcript').textContent='';}
}

const numWords={one:1,two:2,three:3,four:4,five:5,six:6,seven:7,eight:8,nine:9,ten:10,eleven:11,twelve:12,a:1,an:1};
function w2n(str){str=str.trim().toLowerCase();if(!isNaN(parseInt(str)))return parseInt(str);return numWords[str]||null;}

// Convert score term to strokes based on par
function scoreTermToStrokes(term, par){
  term=term.toLowerCase().trim();
  const n=w2n(term);
  if(n)return n;
  if(term==='ace'||term==='hole in one')return 1;
  if(term==='condor')return par-4;
  if(term==='albatross'||term==='double eagle')return par-3;
  if(term==='eagle')return par-2;
  if(term==='birdie')return par-1;
  if(term==='par')return par;
  if(term==='bogey')return par+1;
  if(term==='double bogey'||term==='double')return par+2;
  if(term==='triple bogey'||term==='triple')return par+3;
  if(term==='quad'||term==='quadruple')return par+4;
  return null;
}

function fixTranscript(text){
  text=text.toLowerCase().trim();

  // Hole number mishearings
  const holeFixes={
    'who won':'hole one','whole one':'hole one','who one':'hole one','hall one':'hole one',
    'who too':'hole two','whole two':'hole two','who to':'hole two','hall two':'hole two',
    'who three':'hole three','whole three':'hole three','hall three':'hole three',
    'who for':'hole four','who four':'hole four','whole four':'hole four','hall four':'hole four',
    'who five':'hole five','whole five':'hole five','hall five':'hole five',
    'who six':'hole six','whole six':'hole six','hall six':'hole six',
    'who seven':'hole seven','whole seven':'hole seven','hall seven':'hole seven',
    'who eight':'hole eight','whole eight':'hole eight','hall eight':'hole eight',
    'who nine':'hole nine','whole nine':'hole nine','hall nine':'hole nine',
    'who ten':'hole ten','whole ten':'hole ten','hall ten':'hole ten',
    'who eleven':'hole eleven','whole eleven':'hole eleven',
    'who twelve':'hole twelve','whole twelve':'hole twelve',
    'who 13':'hole 13','whole 13':'hole 13',
    'who 14':'hole 14','whole 14':'hole 14',
    'who 15':'hole 15','whole 15':'hole 15',
    'who 16':'hole 16','whole 16':'hole 16',
    'who 17':'hole 17','whole 17':'hole 17',
    'who 18':'hole 18','whole 18':'hole 18',
  };
  for(const[bad,good]of Object.entries(holeFixes)){
    text=text.replace(new RegExp('\\b'+bad+'\\b','gi'),good);
  }

  // Score term mishearings
  const scoreFixes={
    // birdie variants
    'birtie':'birdie','birty':'birdie','burdie':'birdie','burdee':'birdie',
    'birdo':'birdie','birdee':'birdie','birdi':'birdie','birdy':'birdie',
    'buddy':'birdie','burdy':'birdie','brady':'birdie','birdie s':'birdie',
    // bogey variants
    'boggy':'bogey','bogy':'bogey','boogie':'bogey','bogie':'bogey',
    'bow g':'bogey','bogue':'bogey','bogee':'bogey',
    // eagle variants
    'legal':'eagle','eagle s':'eagle','egal':'eagle','eggle':'eagle',
    // par variants
    'bar':'par','far':'par','car':'par','par s':'par',
    // double bogey
    'double bogy':'double bogey','double boggy':'double bogey','double bogie':'double bogey',
    // triple bogey
    'triple bogy':'triple bogey','triple boggy':'triple bogey',
    // ace / hole in one
    'a s':'ace','hey s':'ace',
  };
  for(const[bad,good]of Object.entries(scoreFixes)){
    text=text.replace(new RegExp('\\b'+bad+'\\b','gi'),good);
  }

  // Fix player name mishearings dynamically
  players.forEach(name=>{
    const nl=name.toLowerCase();
    // Common single-char off mishearings (e.g. "dustin" -> "dusty in")
    // Just normalize spacing around the name
    text=text.replace(new RegExp(nl.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),nl);
  });

  return text;
}

function bestNameMatch(word, playerList){
  // Returns the player whose name best matches the word, or null
  // Allows partial match: "dusty" -> "Dustin", "tuck" -> "Tucker"
  word=word.toLowerCase();
  let best=null,bestScore=999;
  playerList.forEach(name=>{
    const nl=name.toLowerCase();
    // Exact match
    if(nl===word){best=name;bestScore=0;return;}
    // Word starts with the name or name starts with word (handles truncation)
    if(nl.startsWith(word)||word.startsWith(nl)){
      const score=Math.abs(nl.length-word.length);
      if(score<bestScore){best=name;bestScore=score;}
      return;
    }
    // Levenshtein for short names
    if(word.length>=3){
      const dist=levenshtein(word,nl);
      const threshold=Math.floor(nl.length/4)+1;
      if(dist<=threshold&&dist<bestScore){best=name;bestScore=dist;}
    }
  });
  return bestScore<=3?best:null;
}

function parseVoice(text){
  text=fixTranscript(text);
  const corrected=text.toLowerCase().trim();
  document.getElementById('voice-transcript').textContent='"'+corrected+'"';

  // Extract hole number if present
  let holeNum=null;
  const hm=corrected.match(/hole\s+(\w+)/i);
  if(hm){
    holeNum=w2n(hm[1]);
    if(!holeNum||holeNum<1||holeNum>holes){
      document.getElementById('voice-feedback').textContent='Hole "'+hm[1]+'" not recognized.';return;
    }
  }

  // Default to current hole or first unfilled
  if(!holeNum){
    const currentEl=document.querySelector('.hole-header.current');
    if(currentEl){
      holeNum=parseInt(currentEl.id.replace('hh-',''));
    } else {
      for(let h=0;h<holes;h++){
        if(players.some((_,pi)=>scores[pi][h]===null)){holeNum=h+1;break;}
      }
      if(!holeNum)holeNum=1;
    }
  }

  const par=pars[holeNum-1];
  const ps={};

  // Tokenize the transcript into words
  const words=corrected.replace(/[,\.!?]/g,' ').split(/\s+/).filter(Boolean);

  // Walk through words looking for name -> score pairs
  for(let i=0;i<words.length;i++){
    const player=bestNameMatch(words[i],players);
    if(player){
      // Look ahead for the score (could be 1 or 2 words: "double bogey")
      const twoWord=words[i+1]&&words[i+2]?words[i+1]+' '+words[i+2]:null;
      const oneWord=words[i+1]||null;
      let sc=null;
      if(twoWord)sc=scoreTermToStrokes(twoWord,par);
      if(!sc&&oneWord)sc=scoreTermToStrokes(oneWord,par);
      if(sc&&sc>0&&sc<=20){ps[player]=sc;i+=twoWord&&scoreTermToStrokes(twoWord,par)?2:1;}
    }
  }

  if(!Object.keys(ps).length){
    document.getElementById('voice-feedback').textContent='No scores heard — try: "Dustin birdie Scott bogey"';
    return;
  }
  applyScoresDirectly(holeNum,ps);
}
function scoreLabel(score,par){
  const d=score-par;
  if(d<=-3)return'albatross';if(d===-2)return'eagle';if(d===-1)return'birdie';
  if(d===0)return'par';if(d===1)return'bogey';if(d===2)return'double bogey';
  if(d===3)return'triple bogey';return score+' strokes';
}

function applyScoresDirectly(hole,scoreMap){
  const hi=hole-1,par=pars[hi];
  Object.entries(scoreMap).forEach(([name,score])=>{
    const pi=players.indexOf(name);if(pi<0)return;
    scores[pi][hi]=score;
    const inp=document.getElementById('s-'+pi+'-'+hi);
    if(inp){inp.value=score;colorScore(pi,hi);}
  });
  refreshTotals();
  // Advance hole highlight
  document.querySelectorAll('.hole-header').forEach(h=>h.classList.remove('current'));
  const next=document.getElementById('hh-'+Math.min(hole+1,holes));
  if(next)next.classList.add('current');
  // Readback
  const parts=Object.entries(scoreMap).map(([name,score])=>name+', '+scoreLabel(score,par));
  const readback='Hole '+hole+'. '+parts.join('. ');
  document.getElementById('voice-feedback').textContent='✓ '+readback;
  setTimeout(()=>{document.getElementById('voice-feedback').textContent='';},5000);
  if(window.speechSynthesis){
    window.speechSynthesis.cancel();
    const utt=new SpeechSynthesisUtterance(readback);
    utt.rate=1.05;utt.pitch=1;utt.volume=1;
    window.speechSynthesis.speak(utt);
  }
}

function exportScores(){
  const cLine=selectedCourse?'Course: '+selectedCourse.name+'\n':'';
  let txt='GOLF SCORECARD\n'+cLine+players.join(' | ')+'\n'+'='.repeat(40)+'\nHole\tPar\tYds\t'+players.join('\t')+'\n';
  for(let h=0;h<holes;h++)txt+=(h+1)+'\t'+pars[h]+'\t'+(yardages[h]||'-')+'\t'+players.map((_,pi)=>scores[pi][h]!==null?scores[pi][h]:'-').join('\t')+'\n';
  txt+='='.repeat(40)+'\nTotal\t'+pars.reduce((a,b)=>a+b,0)+'\t'+yardages.reduce((a,b)=>a+b,0)+'\t'+players.map((_,pi)=>{const f=scores[pi].filter(s=>s!==null);return f.length?f.reduce((a,b)=>a+b,0):'-';}).join('\t');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain'}));a.download='scorecard.txt';a.click();
}
function confirmReset(){
  if(confirm('Start a new round? Current scores will be lost.')){
    isListening=false;if(recognition)try{recognition.stop();}catch(e){}
    selectedCourse=null;selectedTee=null;
    document.getElementById('scorecard-screen').style.display='none';
    document.getElementById('setup-screen').style.display='block';
    document.getElementById('course-results').innerHTML='';
    document.getElementById('course-input').value='';
    document.getElementById('search-status').textContent='Type a course name and hit Search';
    document.getElementById('tee-section').style.display='none';
    document.getElementById('selected-badge').style.display='none';
    document.getElementById('course-banner').style.display='none';
  }
}
