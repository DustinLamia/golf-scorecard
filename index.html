<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VoiceScore</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --green:#2d5a27;--cream:#f5f0e8;--tan:#d4c9b0;--dark:#1a1a1a;--red:#c0392b;--blue:#2980b9;--gold:#c9a84c; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--green);min-height:100vh;color:var(--cream);background-image:radial-gradient(ellipse at 20% 50%,rgba(74,140,65,.4) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(45,90,39,.6) 0%,transparent 50%);}
  header{text-align:center;padding:24px 20px 12px;}
  header h1{font-family:'Bebas Neue',cursive;font-size:clamp(2.4rem,8vw,3.5rem);letter-spacing:4px;color:var(--cream);text-shadow:2px 2px 0 rgba(0,0,0,.3);}
  header p{font-size:.75rem;color:var(--tan);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
  #setup-screen{padding:20px;max-width:500px;margin:0 auto;}
  .setup-card{background:rgba(245,240,232,.1);backdrop-filter:blur(10px);border:1px solid rgba(245,240,232,.2);border-radius:16px;padding:24px;margin-bottom:16px;position:relative;z-index:1;}
  .setup-card:first-child{z-index:10;}
  .setup-card h2{font-family:'Bebas Neue',cursive;font-size:1.4rem;letter-spacing:2px;margin-bottom:16px;color:var(--gold);}
  .player-inputs{display:flex;flex-direction:column;gap:10px;}
  .player-input-row{display:flex;align-items:center;gap:10px;}
  .player-input-row span{width:28px;height:28px;background:var(--gold);color:var(--dark);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex-shrink:0;}
  input[type="text"],input[type="number"]{flex:1;background:rgba(0,0,0,.25);border:1px solid rgba(245,240,232,.25);border-radius:8px;padding:10px 14px;color:var(--cream);font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s;}
  input[type="text"]:focus,input[type="number"]:focus{border-color:var(--gold);}
  input::placeholder{color:rgba(245,240,232,.4);}
  .course-search-row{display:flex;gap:8px;position:relative;}
  .course-search-row input{flex:1;}
  .btn-search{padding:10px 16px;background:var(--gold);border:none;border-radius:8px;color:var(--dark);font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;}
  .course-results:empty{display:none;}
  .course-results{position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:1000;display:flex;flex-direction:column;gap:0;max-height:300px;overflow-y:auto;background:#1e3d1a;border:1px solid rgba(201,168,76,.35);border-radius:10px;box-shadow:0 12px 40px rgba(0,0,0,.7);}
  .course-item{padding:11px 14px;background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,.07);cursor:pointer;transition:background .12s;text-align:left;}
  .course-item:last-child{border-bottom:none;}
  .course-item:hover,.course-item.selected{background:rgba(201,168,76,.2);}
  .course-item .cn{font-size:.9rem;font-weight:600;color:#f5f0e8;}
  .course-item .cl{font-size:.73rem;color:#b8a88a;margin-top:3px;}
  .search-status{font-size:.78rem;color:var(--tan);margin-top:6px;min-height:18px;}
  .tee-selector{margin-top:12px;}
  .tee-selector label{font-size:.8rem;color:var(--tan);display:block;margin-bottom:6px;}
  .tee-btns{display:flex;gap:6px;flex-wrap:wrap;}
  .tee-btn{padding:6px 14px;border-radius:6px;border:1px solid rgba(245,240,232,.3);background:transparent;color:var(--cream);font-size:.8rem;cursor:pointer;transition:all .15s;}
  .tee-btn.active{background:var(--gold);border-color:var(--gold);color:var(--dark);font-weight:600;}
  .selected-badge{margin-top:10px;padding:10px 14px;background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);border-radius:8px;font-size:.85rem;color:var(--gold);}
  .holes-row{display:flex;gap:12px;align-items:center;}
  .holes-row label{font-size:.85rem;color:var(--tan);flex:1;}
  .holes-btn-group{display:flex;gap:8px;}
  .holes-btn{padding:8px 18px;border-radius:8px;border:1px solid rgba(245,240,232,.3);background:transparent;color:var(--cream);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.9rem;transition:all .2s;}
  .holes-btn.active{background:var(--gold);border-color:var(--gold);color:var(--dark);font-weight:600;}
  .btn-start{width:100%;padding:16px;background:var(--gold);border:none;border-radius:12px;font-family:'Bebas Neue',cursive;font-size:1.4rem;letter-spacing:3px;color:var(--dark);cursor:pointer;box-shadow:0 4px 20px rgba(201,168,76,.4);margin-top:8px;}
  #scorecard-screen{display:none;padding:12px;}
  .course-banner{text-align:center;margin-bottom:8px;}
  .course-banner h3{font-family:'Bebas Neue',cursive;font-size:1.2rem;letter-spacing:2px;color:var(--gold);}
  .course-banner p{font-size:.7rem;color:var(--tan);text-transform:uppercase;letter-spacing:1px;}
  .voice-section{display:flex;flex-direction:column;align-items:center;padding:16px 0 12px;}
  .voice-btn{width:80px;height:80px;border-radius:50%;border:3px solid var(--cream);background:rgba(245,240,232,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(10px);}
  .voice-btn svg{width:32px;height:32px;fill:var(--cream);}
  .voice-btn.listening{background:rgba(192,57,43,.3);border-color:var(--red);animation:pulse-ring 1.2s ease-out infinite;}
  .voice-btn.listening svg{fill:var(--red);}
  @keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(192,57,43,.5);}70%{box-shadow:0 0 0 20px rgba(192,57,43,0);}100%{box-shadow:0 0 0 0 rgba(192,57,43,0);}}
  .voice-hint{margin-top:10px;font-size:.75rem;color:var(--tan);text-align:center;letter-spacing:1px;text-transform:uppercase;max-width:260px;line-height:1.5;}
  .voice-transcript{margin-top:8px;font-size:.85rem;color:var(--cream);text-align:center;min-height:20px;font-style:italic;opacity:.8;padding:0 20px;}
  .voice-feedback{margin-top:6px;font-size:.8rem;text-align:center;min-height:18px;padding:0 20px;color:var(--gold);font-weight:500;}
  .scorecard-wrapper{overflow-x:auto;border-radius:12px;background:rgba(0,0,0,.25);backdrop-filter:blur(10px);border:1px solid rgba(245,240,232,.15);}
  table{width:100%;border-collapse:collapse;min-width:520px;font-size:.82rem;}
  thead tr{background:rgba(0,0,0,.3);}
  th{padding:8px 5px;text-align:center;font-family:'Bebas Neue',cursive;letter-spacing:1px;font-size:.9rem;color:var(--gold);border-bottom:1px solid rgba(245,240,232,.15);}
  th:first-child{text-align:left;padding-left:12px;min-width:85px;}
  td{padding:6px 5px;text-align:center;border-bottom:1px solid rgba(245,240,232,.08);color:var(--cream);}
  td:first-child{text-align:left;padding-left:12px;font-weight:500;white-space:nowrap;}
  tr:last-child td{border-bottom:none;}
  .yardage-row td{color:var(--tan);font-size:.72rem;background:rgba(0,0,0,.1);}
  .score-cell{min-width:34px;}
  .score-cell input{width:30px;height:30px;background:rgba(255,255,255,.1);border:1px solid rgba(245,240,232,.2);border-radius:6px;text-align:center;color:var(--cream);font-size:.88rem;font-family:'DM Sans',sans-serif;outline:none;padding:0;transition:all .15s;}
  .score-cell input:focus{border-color:var(--gold);background:rgba(201,168,76,.15);}
  .score-cell input.eagle{background:rgba(201,168,76,.4);border-color:var(--gold);color:var(--gold);font-weight:700;}
  .score-cell input.birdie{background:rgba(41,128,185,.35);border-color:var(--blue);}
  .score-cell input.par{background:rgba(255,255,255,.08);}
  .score-cell input.bogey{background:rgba(192,57,43,.25);border-color:rgba(192,57,43,.5);}
  .score-cell input.double{background:rgba(192,57,43,.45);border-color:var(--red);}
  .total-col{font-family:'Bebas Neue',cursive;font-size:1rem;letter-spacing:1px;}
  .total-row td{background:rgba(0,0,0,.3);font-family:'Bebas Neue',cursive;font-size:1rem;letter-spacing:1px;color:var(--gold);padding-top:10px;padding-bottom:10px;}
  .plus-minus{font-size:.65rem;color:var(--tan);display:block;font-family:'DM Sans',sans-serif;font-weight:400;letter-spacing:0;}
  .hole-header.current{color:var(--cream)!important;}
  .hole-header.current::after{content:'▼';display:block;font-size:.5rem;color:var(--gold);margin-top:-2px;}
  .bottom-controls{display:flex;gap:10px;padding:16px 0 8px;justify-content:center;}
  .btn-sm{padding:10px 20px;border-radius:8px;border:1px solid rgba(245,240,232,.3);background:rgba(245,240,232,.1);color:var(--cream);font-family:'DM Sans',sans-serif;font-size:.85rem;cursor:pointer;}
  .btn-sm.danger{border-color:rgba(192,57,43,.5);color:rgba(192,57,43,.8);}
  .legend{display:flex;gap:12px;justify-content:center;padding:8px 0 16px;flex-wrap:wrap;}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:.7rem;color:var(--tan);text-transform:uppercase;letter-spacing:1px;}
  .legend-dot{width:10px;height:10px;border-radius:2px;}
  @media(max-width:400px){header h1{font-size:2rem;}}
</style>
</head>

<div id="setup-screen">

    <h2>Course</h2>

function restoreState(){
  try{
    const raw=sessionStorage.getItem('vs_state');
    if(!raw)return false;
    const s=JSON.parse(raw);
    if(s.screen!=='scorecard'||!s.players||!s.players.length)return false;
    players=s.players;holes=s.holes;pars=s.pars;yardages=s.yardages;scores=s.scores;

function levenshtein(a,b){
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
  for(let j=0;j<=n;j++)dp[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function fuzzyMatch(query,course){
  const q=query.toLowerCase().trim();
  const name=(course.name||'').toLowerCase();
  const city=(course.city||'').toLowerCase();
  const nameWords=name.split(/\s+/);
  const cityWords=city.split(/\s+/);
  const allWords=[...nameWords,...cityWords];
  if(allWords.some(w=>w.startsWith(q)))return 0;
  if(q.length<4)return 999;
  if(name.includes(q)||city.includes(q))return 1;
  const qWords=q.split(/\s+/);
  let totalDist=0;
  for(const qw of qWords){
    if(qw.length<2)continue;
    const best=Math.min(...allWords.map(tw=>levenshtein(qw,tw.substring(0,qw.length+2))));
    const threshold=Math.floor(qw.length/4)+1;
    if(best>threshold)return 999;
    totalDist+=best;
  }
  return totalDist;
}

const API_KEY='BFTCFEDTFTZTS55WTT4K55SKZE';
const API_BASE='https://api.golfcourseapi.com/v1';

async function searchCourse(){
  const query=document.getElementById('course-input').value.trim();
  const status=document.getElementById('search-status');
  const results=document.getElementById('course-results');
  results.innerHTML='';
  document.getElementById('tee-section').style.display='none';
  document.getElementById('selected-badge').style.display='none';
  if(!query){status.textContent='';return;}

  const localMatches=COURSES
    .map(c=>({course:c,score:fuzzyMatch(query,c)}))
    .filter(x=>x.score<999).sort((a,b)=>a.score-b.score).map(x=>x.course);

  if(localMatches.length){
    status.textContent='Searching...';
    localMatches.forEach(course=>{
      const div=document.createElement('div');
      div.className='course-item';
      div.innerHTML='<div class="cn">'+course.name+'</div><div class="cl">'+course.city+(course.state?', '+course.state:'')+' &middot; '+course.tees[0].pars.length+' holes &middot; <span style="color:var(--gold);font-size:.7rem">&#9733; Local</span></div>';
      div.onclick=()=>selectCourse(course,div);
      results.appendChild(div);
    });
  }

  status.textContent='&#8987; Searching...';
  try{
    const resp=await fetch(API_BASE+'/search?search_query='+encodeURIComponent(query)+'&per_page=20',{headers:{'Authorization':'Key '+API_KEY}});
    const data=await resp.json();
    const apiCourses=(data.courses||[]).filter(c=>c.location?.country==='United States');
    const localNames=new Set(localMatches.map(c=>c.name.toLowerCase()));
    const newFromApi=apiCourses.filter(c=>!localNames.has(c.course_name.toLowerCase()));
    const total=localMatches.length+newFromApi.length;
    if(!total){status.textContent='No matches found.';return;}
    status.textContent=total+' course'+(total!==1?'s':'')+' found';
    newFromApi.forEach(course=>{
      const div=document.createElement('div');
      div.className='course-item';
      const city=course.location?.city||'',state=course.location?.state||'';
      div.innerHTML='<div class="cn">'+course.course_name+'</div><div class="cl">'+city+(state?', '+state:'')+' &middot; Tap to load scorecard</div>';
      div.onclick=()=>selectApiCourse(course.id,div);
      results.appendChild(div);
    });
  }catch(e){
    if(!localMatches.length)status.textContent='Offline – try "Custom / Local Course"';
    else status.textContent=localMatches.length+' local course'+(localMatches.length!==1?'s':'')+' found';
  }
}

async function selectApiCourse(id,el){
  document.querySelectorAll('.course-item').forEach(d=>d.classList.remove('selected'));
  el.classList.add('selected');
  el.querySelector('.cl').textContent='Loading scorecard...';
  try{
    const resp=await fetch(API_BASE+'/courses/'+id,{headers:{'Authorization':'Key '+API_KEY}});
    const data=await resp.json();
    const c=data.course;
    const rawTees=[...(c.tees?.male||[]),...(c.tees?.female||[])];
    const seen=new Set(),tees=[];
    rawTees.forEach(t=>{
      const key=t.tee_name+'-'+(t.holes?.length||0);
      if(!seen.has(key)&&t.holes&&t.holes.length>0){
        seen.add(key);
        tees.push({name:t.tee_name+' ('+t.total_yards+'y)',pars:t.holes.map(h=>h.par),yardages:t.holes.map(h=>h.yardage)});
      }
    });
    if(!tees.length){el.querySelector('.cl').textContent='No scorecard data available';return;}
    const course={name:c.course_name,city:c.location?.city||'',state:c.location?.state||'',tees};
    el.querySelector('.cl').textContent=course.city+(course.state?', '+course.state:'')+' · '+tees[0].pars.length+' holes';
    selectCourse(course,el);
  }catch(e){el.querySelector('.cl').textContent='Error loading – try again';el.classList.remove('selected');}
}

function selectCourse(course,el){
  document.querySelectorAll('.course-item').forEach(d=>d.classList.remove('selected'));
  el.classList.add('selected');
  selectedCourse=course;
  document.getElementById('course-input').value=course.name;
  setTimeout(closeDropdown,150);
  selectedTee=course.tees[0];
  holes=course.tees[0].pars.length;
  document.querySelectorAll('.holes-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.holes)===holes));
  const teeSection=document.getElementById('tee-section');
  const teeBtns=document.getElementById('tee-btns');
  if(course.tees.length>1){
    teeSection.style.display='block';teeBtns.innerHTML='';
    course.tees.forEach((tee,i)=>{
      const btn=document.createElement('button');
      btn.className='tee-btn'+(i===0?' active':'');

  updateBadge();
}

function startRound(){
  unlockAudio();
  const inputs=document.querySelectorAll('.player-name');
  players=[];
  inputs.forEach(inp=>{const v=inp.value.trim();if(v)players.push(v);});
  if(!players.length)players=['Player 1'];
  if(selectedCourse&&selectedTee){
    pars=selectedTee.pars.slice(0,holes);
    yardages=selectedTee.yardages.slice(0,holes);
    while(pars.length<holes)pars.push(4);
    while(yardages.length<holes)yardages.push(0);
  }else{pars=Array(holes).fill(4);yardages=Array(holes).fill(0);}
  scores=players.map(()=>Array(holes).fill(null));
  document.getElementById('setup-screen').style.display='none';
  document.getElementById('scorecard-screen').style.display='block';
  if(selectedCourse){
    document.getElementById('course-banner').style.display='block';
    document.getElementById('banner-name').textContent=selectedCourse.name;

function updatePar(hi,val){pars[hi]=parseInt(val)||4;refreshTotals();document.getElementById('par-total').textContent=pars.reduce((a,b)=>a+b,0);saveState();}
function manualScore(pi,hi,val){scores[pi][hi]=val?parseInt(val):null;colorScore(pi,hi);refreshTotals();saveState();}
function colorScore(pi,hi){
  const inp=document.getElementById('s-'+pi+'-'+hi);
  if(!inp)return;
  const s=scores[pi][hi],par=pars[hi];
  inp.className='';
  if(s===null)return;
  if(s<=par-2)inp.classList.add('eagle');
  else if(s===par-1)inp.classList.add('birdie');
  else if(s===par)inp.classList.add('par');
  else if(s===par+1)inp.classList.add('bogey');
  else inp.classList.add('double');
}
function refreshTotals(){
  players.forEach((_,pi)=>{
    const filled=scores[pi].filter(s=>s!==null);
    const total=filled.length?filled.reduce((a,b)=>a+b,0):null;
    const cell=document.getElementById('total-'+pi);
    if(!cell)return;
    if(total===null){cell.textContent='-';return;}
    const parSoFar=scores[pi].map((s,hi)=>s!==null?pars[hi]:0).reduce((a,b)=>a+b,0);
    const diff=total-parSoFar;
    cell.innerHTML=total+'<span class="plus-minus">'+(diff===0?'E':diff>0?'+'+diff:diff)+'</span>';
  });
}

// ── Voice: SINGLE recognition instance, two modes ──
// iOS/Safari only allows one active SpeechRecognition at a time.
// We use ONE continuous instance that switches between 'wake' and 'score' mode.
function setupSpeech(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){
    document.getElementById('voice-hint').textContent='Use Safari on iPhone or Chrome on Android.';
    document.getElementById('wake-status').textContent='';
    return;
  }

  const WAKE_TRIGGERS=['voice score','hey voice score','voicescore','hey voicescore','voice scorer','hey voice','voice scores','boys score','voice cor','voiced score','a voice score','the voice score','voice school','boys core','voice store','boys cor'];

  let _mode='wake';
  let _accumulated='';

  recognition=new SR();
  recognition.continuous=true;
  recognition.interimResults=true;
  recognition.lang='en-US';

  recognition.onresult=(e)=>{
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)final+=e.results[i][0].transcript+' ';
      else interim+=e.results[i][0].transcript;
    }

    if(_mode==='wake'){
      const heard=(final||interim).toLowerCase().trim();
      // Also allow tap-to-activate: if isListening was set by button tap, switch mode
      const wakeMatch=WAKE_TRIGGERS.find(w=>heard.includes(w));
      if(isListening||wakeMatch){
        unlockAudio();
        // Strip the wake phrase itself from what follows, so it's not parsed as a score
        let remainder=heard;
        if(wakeMatch){const idx=heard.indexOf(wakeMatch);remainder=heard.slice(idx+wakeMatch.length).trim();}
        _accumulated=remainder?' '+remainder:'';
        _mode='score';
        isListening=true;
        setListeningUI(true);
        playMicOn();
        document.getElementById('voice-feedback').textContent='';
        clearTimeout(window._silenceTimer);
        window._silenceTimer=setTimeout(()=>commitScore(true),12000);
      }
    } else {
      // Score mode: accumulate chunks, reset 2s silence timer on every word
      if(final)_accumulated+=final;
      const display=_accumulated||interim;
      if(display.trim())
        document.getElementById('voice-transcript').textContent='"'+fixTranscript(display.trim())+'"';
      clearTimeout(window._silenceTimer);
      window._silenceTimer=setTimeout(()=>commitScore(false),2000);
    }
  };

  function commitScore(timedOut){
    if(_mode!=='score')return;
    clearTimeout(window._silenceTimer);
    const toparse=_accumulated.trim();
    _accumulated='';
    _mode='wake';
    isListening=false;
    setListeningUI(false);
    playMicOff();
    if(toparse){
      parseVoice(toparse);
    } else if(timedOut){
      document.getElementById('voice-feedback').textContent='Mic timed out \u2014 say "Hey VoiceScore"';
      setTimeout(()=>{document.getElementById('voice-feedback').textContent='';},3000);
    }
  }

  recognition.onend=()=>{
    // Always restart — we need continuous wake-word monitoring
    if(!recognition._killed){
      setTimeout(()=>{try{recognition.start();}catch(ex){}},300);
    }
  };

  recognition.onerror=(e)=>{
    if(e.error==='not-allowed'){
      document.getElementById('voice-hint').textContent='Mic access denied. Tap to enable in Settings.';
      document.getElementById('wake-status').textContent='';
    } else if(e.error==='aborted'){
      // ignore — expected on restart
    } else if(e.error!=='no-speech'){
      setTimeout(()=>{if(!recognition._killed)try{recognition.start();}catch(ex){}},800);
    }
  };

  recognition._killed=false;
  try{recognition.start();}catch(e){}

}

// Manual tap handler — sets isListening so next onresult switches to score mode
function toggleListening(){
  unlockAudio();
  if(!recognition)return;
  if(isListening){
    isListening=false;
    setListeningUI(false);
    playMicOff();
    clearTimeout(window._silenceTimer);
  } else {
    isListening=true;
    setListeningUI(true);
    playMicOn();
    clearTimeout(window._silenceTimer);
    window._silenceTimer=setTimeout(()=>{
      if(isListening){isListening=false;setListeningUI(false);}
    },12000);
  }
}

const numWords={one:1,two:2,three:3,four:4,five:5,six:6,seven:7,eight:8,nine:9,ten:10,eleven:11,twelve:12};
function w2n(str){str=str.trim().toLowerCase();if(!isNaN(parseInt(str)))return parseInt(str);return numWords[str]||null;}

function scoreTermToStrokes(term,par){
  term=term.toLowerCase().trim();
  const n=w2n(term);if(n)return n;
  if(term==='ace'||term==='hole in one')return 1;
  if(term==='albatross'||term==='double eagle')return par-3;
  if(term==='eagle')return par-2;
  if(term==='birdie')return par-1;
  if(term==='par')return par;
  if(term==='bogey')return par+1;
  if(term==='double bogey'||term==='double')return par+2;
  if(term==='triple bogey'||term==='triple')return par+3;
  if(term==='quad'||term==='quadruple')return par+4;
  return null;
}

function fixTranscript(text){
  text=text.toLowerCase().trim();
  const holeFixes={'who won':'hole one','whole one':'hole one','who one':'hole one','hall one':'hole one','who too':'hole two','whole two':'hole two','who to':'hole two','hall two':'hole two','who three':'hole three','whole three':'hole three','hall three':'hole three','who for':'hole four','who four':'hole four','whole four':'hole four','hall four':'hole four','who five':'hole five','whole five':'hole five','hall five':'hole five','who six':'hole six','whole six':'hole six','hall six':'hole six','who seven':'hole seven','whole seven':'hole seven','hall seven':'hole seven','who eight':'hole eight','whole eight':'hole eight','hall eight':'hole eight','who nine':'hole nine','whole nine':'hole nine','hall nine':'hole nine','who ten':'hole ten','whole ten':'hole ten','hall ten':'hole ten','who eleven':'hole eleven','whole eleven':'hole eleven','who twelve':'hole twelve','whole twelve':'hole twelve','who 13':'hole 13','whole 13':'hole 13','who 14':'hole 14','whole 14':'hole 14','who 15':'hole 15','whole 15':'hole 15','who 16':'hole 16','whole 16':'hole 16','who 17':'hole 17','whole 17':'hole 17','who 18':'hole 18','whole 18':'hole 18'};
  for(const[bad,good]of Object.entries(holeFixes))text=text.replace(new RegExp('\\b'+bad+'\\b','gi'),good);
  const scoreFixes={'birtie':'birdie','birty':'birdie','burdie':'birdie','burdee':'birdie','birdo':'birdie','birdee':'birdie','birdi':'birdie','birdy':'birdie','buddy':'birdie','burdy':'birdie','brady':'birdie','bertie':'birdie','birty':'birdie','berty':'birdie','burtie':'birdie','boggy':'bogey','bogy':'bogey','boogie':'bogey','bogie':'bogey','bow g':'bogey','bogue':'bogey','bogee':'bogey','parr':'par','pars':'par','par s':'par','legal':'eagle','egal':'eagle','eggle':'eagle','double bogy':'double bogey','double boggy':'double bogey','double bogie':'double bogey','triple bogy':'triple bogey','triple boggy':'triple bogey'};
  for(const[bad,good]of Object.entries(scoreFixes))text=text.replace(new RegExp('\\b'+bad+'\\b','gi'),good);
  players.forEach(name=>{
    const nl=name.toLowerCase();
    text=text.replace(new RegExp(nl.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),nl);
  });
  return text;
}

function bestNameMatch(word,playerList){
  word=word.toLowerCase();
  let best=null,bestScore=999;
  playerList.forEach(name=>{
    const nl=name.toLowerCase();
    if(nl===word){best=name;bestScore=0;return;}
    if(nl.startsWith(word)||word.startsWith(nl)){
      const score=Math.abs(nl.length-word.length);
      if(score<bestScore){best=name;bestScore=score;}
      return;
    }
    if(word.length>=3){
      const dist=levenshtein(word,nl);
      const threshold=Math.floor(nl.length/4)+1;
      if(dist<=threshold&&dist<bestScore){best=name;bestScore=dist;}
    }
  });
  return bestScore<=3?best:null;
}

function parseVoice(text){
  text=fixTranscript(text);
  const corrected=text.toLowerCase().trim();
  document.getElementById('voice-transcript').textContent='"'+corrected+'"';

  let holeNum=null;
  const hm=corrected.match(/hole\s+(\w+)/i);
  if(hm){
    holeNum=w2n(hm[1]);
    if(!holeNum||holeNum<1||holeNum>holes){
      document.getElementById('voice-feedback').textContent='Hole "'+hm[1]+'" not recognized.';return;
    }
  }
  if(!holeNum){
    const currentEl=document.querySelector('.hole-header.current');
    if(currentEl)holeNum=parseInt(currentEl.id.replace('hh-',''));
    else{
      for(let h=0;h<holes;h++){if(players.some((_,pi)=>scores[pi][h]===null)){holeNum=h+1;break;}}
      if(!holeNum)holeNum=1;
    }
  }

  const par=pars[holeNum-1];
  const ps={};
  const FILLERS=new Set(['got','a','an','with','made','gets','had','scored','makes','shot','hit','takes','for','the','his','her','get']);
  const words=corrected.replace(/[,\.!?]/g,' ').split(/\s+/).filter(Boolean);

  for(let i=0;i<words.length;i++){
    if(FILLERS.has(words[i]))continue;
    const player=bestNameMatch(words[i],players);
    if(player){
      // Skip filler words between name and score
      let j=i+1;
      while(j<words.length&&FILLERS.has(words[j]))j++;
      const twoWord=words[j]&&words[j+1]?words[j]+' '+words[j+1]:null;
      const oneWord=words[j]||null;
      let sc=null;
      if(twoWord)sc=scoreTermToStrokes(twoWord,par);
      if(!sc&&oneWord)sc=scoreTermToStrokes(oneWord,par);
      if(sc&&sc>0&&sc<=20){ps[player]=sc;i=j+(twoWord&&scoreTermToStrokes(twoWord,par)?1:0);}
    }
  }

  if(!Object.keys(ps).length){
    const handled=handleQuery(corrected);
    if(!handled)
      document.getElementById('voice-feedback').textContent='No scores heard \u2014 try: "Dustin birdie Scott bogey"';
    return;
  }
  applyScoresDirectly(holeNum,ps);
}

function handleQuery(text){
  // Detect "everyone/all/leaderboard" query
  if(/everyone|everybody|all scores|leaderboard|standings|how is everyone|how are we|what(?:'s| is) the score|the score|current score|read.*score|score update/.test(text)){
    speakAllScores();return true;
  }
  // Detect single player query: "what is dustin's score", "how is scott doing", "dustin's total"
  const patterns=[
    /what(?:'s| is| are)?\s+(.+?)(?:'s|s)?\s+(?:score|total|at|shooting|doing)/i,
    /how\s+is\s+(.+?)\s+(?:doing|shooting|playing)/i,
    /how(?:'s)\s+(.+?)\s+(?:doing|shooting|playing)/i,
    /(.+?)(?:'s|s)?\s+(?:score|total|current)/i,
  ];
  for(const pat of patterns){
    const m=text.match(pat);
    if(m){
      const raw=m[1].trim().replace(/^(is|the|a|an)\s+/i,'');
      let name=bestNameMatch(raw,players);
      if(!name){
        for(const w of raw.split(/\s+/)){name=bestNameMatch(w,players);if(name)break;}
      }
      if(name){speakPlayerScore(name);return true;}
    }
  }
  return false;
}

function speakPlayerScore(name){
  const pi=players.indexOf(name);if(pi<0)return;
  const filled=scores[pi].filter(s=>s!==null);
  if(!filled.length){
    const msg=name+' has no scores yet.';
    showAndSpeak(msg,4000);return;
  }
  const total=filled.reduce((a,b)=>a+b,0);
  const parSoFar=scores[pi].map((s,hi)=>s!==null?pars[hi]:0).reduce((a,b)=>a+b,0);
  const diff=total-parSoFar;
  const holesPlayed=filled.length;
  const diffStr=diff===0?'even par':diff>0?diff+' over par':Math.abs(diff)+' under par';
  const msg=name+' is '+diffStr+' through '+holesPlayed+' hole'+(holesPlayed!==1?'s':'')+', total '+total+'.';
  showAndSpeak(msg,6000);
}

function speakAllScores(){
  const parts=players.map(name=>{
    const pi=players.indexOf(name);
    const filled=scores[pi].filter(s=>s!==null);
    if(!filled.length)return name+', no score yet';
    const total=filled.reduce((a,b)=>a+b,0);
    const parSoFar=scores[pi].map((s,hi)=>s!==null?pars[hi]:0).reduce((a,b)=>a+b,0);
    const diff=total-parSoFar;
    const diffStr=diff===0?'even':diff>0?'+'+diff:''+diff;
    return name+', '+total+', '+diffStr;
  });
  showAndSpeak('Standings. '+parts.join('. ')+'.',8000);
}

function showAndSpeak(msg,duration){
  const fb=document.getElementById('voice-feedback');
  fb.textContent=msg;
  setTimeout(()=>{if(fb.textContent===msg)fb.textContent='';},duration);
  autoSpeak(msg);
}

// ── Audio feedback sounds ──
function playTone(freq, duration, type='sine', fadeOut=true){
  if(!window._audioUnlocked)return;
  try{
    const ctx=window._audioCtx||(window._audioCtx=new(window.AudioContext||window.webkitAudioContext)());
    if(ctx.state==='suspended')ctx.resume();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.type=type;osc.frequency.setValueAtTime(freq,ctx.currentTime);
    gain.gain.setValueAtTime(0.18,ctx.currentTime);
    if(fadeOut)gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+duration);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+duration);
  }catch(e){}
}

function playMicOn(){
  // Two ascending tones — "ready"
  playTone(660,0.12);
  setTimeout(()=>playTone(880,0.15),100);
}

function playMicOff(){
  // Two descending tones — "done"
  playTone(880,0.12);
  setTimeout(()=>playTone(550,0.18),100);
}

// iOS audio unlock — must call this inside a real user gesture (tap)
// After that, speechSynthesis works automatically
function unlockAudio(){
  if(window._audioUnlocked)return;
  window._audioUnlocked=true;
  // Create and resume AudioContext
  if(!window._audioCtx)window._audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(window._audioCtx.state==='suspended')window._audioCtx.resume();
  // Fire a silent utterance to warm up speechSynthesis
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(' ');
  u.volume=0.01;u.rate=1;
  window.speechSynthesis.speak(u);
}

function speakNow(btn){
  if(!window._pendingReadback)return;
  if(btn)btn.remove();
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(window._pendingReadback);
  utt.rate=1.05;utt.pitch=1;utt.volume=1;
  window.speechSynthesis.speak(utt);
  window._pendingReadback=null;
}

function autoSpeak(text){
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(text);
  utt.rate=1.05;utt.pitch=1;utt.volume=1;
  window.speechSynthesis.speak(utt);
}

function scoreLabel(score,par){
  const d=score-par;
  if(d<=-3)return'albatross';if(d===-2)return'eagle';if(d===-1)return'birdie';
  if(d===0)return'par';if(d===1)return'bogey';if(d===2)return'double bogey';
  if(d===3)return'triple bogey';return score+' strokes';
}

function applyScoresDirectly(hole,scoreMap){
  const hi=hole-1,par=pars[hi];
  Object.entries(scoreMap).forEach(([name,score])=>{
    const pi=players.indexOf(name);if(pi<0)return;
    scores[pi][hi]=score;
    const inp=document.getElementById('s-'+pi+'-'+hi);
    if(inp){inp.value=score;colorScore(pi,hi);}
  });
  refreshTotals();
  saveState();
  document.querySelectorAll('.hole-header').forEach(h=>h.classList.remove('current'));
  const next=document.getElementById('hh-'+Math.min(hole+1,holes));
  if(next)next.classList.add('current');
  const parts=Object.entries(scoreMap).map(([name,score])=>name+', '+scoreLabel(score,par));
  const readback='Hole '+hole+'. '+parts.join('. ');
  document.getElementById('voice-feedback').textContent='\u2713 '+readback;
  setTimeout(()=>{document.getElementById('voice-feedback').textContent='';},5000);
  showAndSpeak('✓ '+readback,6000);
}

function exportScores(){
  // ── Canvas scorecard image export ──
  const PAD = 48;
  const COL_LABEL = 130;
  const COL_W = 46;
  const ROW_H = 42;
  const HEADER_H = 140;
  const FOOTER_H = 56;

  const numCols = holes + 2; // label + holes + total
  const numRows = 3 + players.length; // par + yds (if any) + players
  const hasYds = yardages.some(y=>y>0);
  const dataRows = (hasYds ? 2 : 1) + players.length; // par row + optional yds + players
  const tableW = COL_LABEL + COL_W * (holes + 1);
  const tableH = ROW_H * (dataRows + 1); // +1 for column headers
  const W = tableW + PAD * 2;
  const H = HEADER_H + tableH + FOOTER_H + PAD;

  const canvas = document.createElement('canvas');
  const DPR = 2;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(DPR, DPR);

  // ── Colors ──
  const C = {
    bg:     '#1e3d1a',
    bgLight:'#2d5a27',
    cream:  '#f5f0e8',
    tan:    '#c9bfa8',
    gold:   '#c9a84c',
    dark:   '#111810',
    red:    '#c0392b',
    blue:   '#2980b9',
    rowAlt: 'rgba(0,0,0,0.18)',
    border: 'rgba(245,240,232,0.12)',
    headerBg:'rgba(0,0,0,0.35)',
  };

  // ── Background ──
  const grad = ctx.createRadialGradient(W*0.2, H*0.5, 0, W*0.2, H*0.5, W*0.8);
  grad.addColorStop(0, '#3a6e32');
  grad.addColorStop(1, '#162e13');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Subtle texture dots
  ctx.fillStyle = 'rgba(255,255,255,0.015)';
  for(let i=0;i<400;i++){
    const x=Math.random()*W, y=Math.random()*H;
    ctx.beginPath();ctx.arc(x,y,1,0,Math.PI*2);ctx.fill();
  }

  // ── Header ──
  const hx = W/2;
  // Gold accent line top
  ctx.fillStyle = C.gold;
  ctx.fillRect(PAD, 22, W - PAD*2, 2);

  // VOICESCORE title
  ctx.fillStyle = C.cream;
  ctx.font = `bold ${36}px 'Bebas Neue', serif`;
  ctx.letterSpacing = '6px';
  ctx.textAlign = 'center';
  ctx.fillText('VOICESCORE', hx, 68);

  // Course name
  if(selectedCourse){
    ctx.fillStyle = C.gold;
    ctx.font = `600 ${15}px 'DM Sans', sans-serif`;
    ctx.letterSpacing = '2px';
    ctx.fillText(selectedCourse.name.toUpperCase(), hx, 92);
    const teeLabel = selectedTee && selectedCourse.tees && selectedCourse.tees.length > 1 ? ' · ' + selectedTee.name + ' Tees' : '';
    const loc = (selectedCourse.city||'') + (selectedCourse.state ? ', '+selectedCourse.state : '') + teeLabel;
    ctx.fillStyle = C.tan;
    ctx.font = `400 ${12}px 'DM Sans', sans-serif`;
    ctx.letterSpacing = '1px';
    ctx.fillText(loc, hx, 112);
  }

  // Date
  const dateStr = new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
  ctx.fillStyle = 'rgba(200,185,165,0.55)';
  ctx.font = `400 ${11}px 'DM Sans', sans-serif`;
  ctx.letterSpacing = '1px';
  ctx.fillText(dateStr.toUpperCase(), hx, 130);

  // Gold divider
  ctx.fillStyle = C.gold;
  ctx.fillRect(PAD, HEADER_H - 6, W - PAD*2, 1);

  // ── Table ──
  const TX = PAD; // table x
  const TY = HEADER_H; // table y

  function cellX(col){ return TX + (col === 0 ? 0 : COL_LABEL + (col-1)*COL_W); }
  function cellW(col){ return col === 0 ? COL_LABEL : COL_W; }

  // Header row bg
  ctx.fillStyle = C.headerBg;
  ctx.fillRect(TX, TY, tableW, ROW_H);

  // Header row text
  ctx.textAlign = 'center';
  ctx.fillStyle = C.gold;
  ctx.font = `bold ${13}px 'Bebas Neue', serif`;
  ctx.letterSpacing = '1px';
  // "HOLE" label
  ctx.textAlign = 'left';
  ctx.fillText('PLAYER', TX + 12, TY + ROW_H/2 + 5);
  ctx.textAlign = 'center';
  for(let h=0;h<holes;h++){
    const cx = cellX(h+1) + cellW(h+1)/2;
    ctx.fillText(h+1, cx, TY + ROW_H/2 + 5);
  }
  ctx.fillText('TOT', cellX(holes+1) + cellW(holes+1)/2, TY + ROW_H/2 + 5);

  // Border under header
  ctx.strokeStyle = C.gold;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(TX, TY + ROW_H);
  ctx.lineTo(TX + tableW, TY + ROW_H);
  ctx.stroke();

  let row = 1;

  // ── Par row ──
  const parRowY = TY + row * ROW_H;
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect(TX, parRowY, tableW, ROW_H);
  ctx.textAlign = 'left';
  ctx.fillStyle = C.tan;
  ctx.font = `400 ${12}px 'DM Sans', sans-serif`;
  ctx.letterSpacing = '0px';
  ctx.fillText('Par', TX + 12, parRowY + ROW_H/2 + 4);
  ctx.textAlign = 'center';
  ctx.font = `500 ${12}px 'DM Sans', sans-serif`;
  for(let h=0;h<holes;h++){
    const cx = cellX(h+1) + cellW(h+1)/2;
    ctx.fillText(pars[h], cx, parRowY + ROW_H/2 + 4);
  }
  ctx.fillText(pars.reduce((a,b)=>a+b,0), cellX(holes+1)+cellW(holes+1)/2, parRowY + ROW_H/2 + 4);
  // Divider
  ctx.strokeStyle = C.border;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(TX, parRowY + ROW_H);
  ctx.lineTo(TX + tableW, parRowY + ROW_H);
  ctx.stroke();
  row++;

  // ── Yardage row ──
  if(hasYds){
    const ydRowY = TY + row * ROW_H;
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.fillRect(TX, ydRowY, tableW, ROW_H);
    ctx.textAlign = 'left';
    ctx.fillStyle = 'rgba(200,185,165,0.5)';
    ctx.font = `400 ${11}px 'DM Sans', sans-serif`;
    ctx.fillText('Yds', TX + 12, ydRowY + ROW_H/2 + 4);
    ctx.textAlign = 'center';
    for(let h=0;h<holes;h++){
      const cx = cellX(h+1) + cellW(h+1)/2;
      ctx.fillText(yardages[h]||'-', cx, ydRowY + ROW_H/2 + 4);
    }
    ctx.fillText(yardages.reduce((a,b)=>a+b,0), cellX(holes+1)+cellW(holes+1)/2, ydRowY + ROW_H/2 + 4);
    ctx.strokeStyle = C.border;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(TX, ydRowY + ROW_H);
    ctx.lineTo(TX + tableW, ydRowY + ROW_H);
    ctx.stroke();
    row++;
  }

  // ── Player rows ──
  function scoreColor(score, par){
    const d = score - par;
    if(d <= -2) return { bg:'rgba(201,168,76,0.38)', border:'rgba(201,168,76,0.9)', text:C.gold };
    if(d === -1) return { bg:'rgba(41,128,185,0.35)', border:'rgba(41,128,185,0.8)', text:'#69b4e0' };
    if(d === 0)  return { bg:'rgba(255,255,255,0.06)', border:'rgba(255,255,255,0.15)', text:C.cream };
    if(d === 1)  return { bg:'rgba(192,57,43,0.22)', border:'rgba(192,57,43,0.5)', text:'#e07060' };
    return           { bg:'rgba(192,57,43,0.4)',  border:'rgba(192,57,43,0.8)', text:'#ff8070' };
  }

  players.forEach((name, pi) => {
    const ry = TY + row * ROW_H;
    // Alt row bg
    ctx.fillStyle = pi % 2 === 0 ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.15)';
    ctx.fillRect(TX, ry, tableW, ROW_H);

    // Player name
    ctx.textAlign = 'left';
    ctx.fillStyle = C.cream;
    ctx.font = `600 ${13}px 'DM Sans', sans-serif`;
    ctx.fillText(name, TX + 12, ry + ROW_H/2 + 4);

    // Scores
    ctx.textAlign = 'center';
    let playerTotal = null;
    let parSoFar = 0;
    for(let h=0;h<holes;h++){
      const sc = scores[pi][h];
      const cx = cellX(h+1) + cellW(h+1)/2;
      if(sc !== null && sc !== undefined){
        const { bg, border, text } = scoreColor(sc, pars[h]);
        // Draw pill/badge
        const bw = 28, bh = 24, bx = cx - bw/2, by = ry + ROW_H/2 - bh/2;
        ctx.fillStyle = bg;
        ctx.beginPath();
        ctx.roundRect(bx, by, bw, bh, 5);
        ctx.fill();
        ctx.strokeStyle = border;
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.fillStyle = text;
        ctx.font = `700 ${13}px 'DM Sans', sans-serif`;
        ctx.fillText(sc, cx, ry + ROW_H/2 + 5);
        if(playerTotal === null) playerTotal = 0;
        playerTotal += sc;
        parSoFar += pars[h];
      } else {
        ctx.fillStyle = 'rgba(200,185,165,0.3)';
        ctx.font = `400 ${12}px 'DM Sans', sans-serif`;
        ctx.fillText('-', cx, ry + ROW_H/2 + 4);
      }
    }

    // Total + +/- diff
    const tcx = cellX(holes+1) + cellW(holes+1)/2;
    if(playerTotal !== null){
      const diff = playerTotal - parSoFar;
      const diffStr = diff === 0 ? 'E' : diff > 0 ? '+'+diff : ''+diff;
      const diffColor = diff < 0 ? '#69b4e0' : diff === 0 ? C.tan : '#e07060';
      ctx.fillStyle = C.gold;
      ctx.font = `bold ${14}px 'Bebas Neue', serif`;
      ctx.fillText(playerTotal, tcx, ry + ROW_H/2 + 1);
      ctx.fillStyle = diffColor;
      ctx.font = `500 ${10}px 'DM Sans', sans-serif`;
      ctx.fillText(diffStr, tcx, ry + ROW_H/2 + 14);
    } else {
      ctx.fillStyle = C.tan;
      ctx.font = `400 ${12}px 'DM Sans', sans-serif`;
      ctx.fillText('-', tcx, ry + ROW_H/2 + 4);
    }

    // Row divider
    ctx.strokeStyle = C.border;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(TX, ry + ROW_H);
    ctx.lineTo(TX + tableW, ry + ROW_H);
    ctx.stroke();

    row++;
  });

  // ── Table outer border ──
  ctx.strokeStyle = 'rgba(201,168,76,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(TX, TY, tableW, ROW_H * (row));

  // Vertical dividers
  ctx.strokeStyle = C.border;
  ctx.lineWidth = 1;
  // After label col
  ctx.beginPath();
  ctx.moveTo(TX + COL_LABEL, TY);
  ctx.lineTo(TX + COL_LABEL, TY + ROW_H * row);
  ctx.stroke();
  // Before total col
  ctx.beginPath();
  ctx.moveTo(TX + COL_LABEL + COL_W*holes, TY);
  ctx.lineTo(TX + COL_LABEL + COL_W*holes, TY + ROW_H * row);
  ctx.stroke();

  // ── Legend ──
  const legendItems = [
    { label:'Eagle+', bg:'rgba(201,168,76,0.38)', border:'rgba(201,168,76,0.9)' },
    { label:'Birdie',  bg:'rgba(41,128,185,0.35)', border:'rgba(41,128,185,0.8)' },
    { label:'Par',     bg:'rgba(255,255,255,0.06)', border:'rgba(255,255,255,0.15)' },
    { label:'Bogey',   bg:'rgba(192,57,43,0.22)', border:'rgba(192,57,43,0.5)' },
    { label:'Double+', bg:'rgba(192,57,43,0.4)',  border:'rgba(192,57,43,0.8)' },
  ];
  const legendY = TY + ROW_H * row + 18;
  const totalLegendW = legendItems.length * 88;
  let lx = (W - totalLegendW) / 2;
  legendItems.forEach(item => {
    const bw = 14, bh = 14;
    ctx.fillStyle = item.bg;
    ctx.beginPath();
    ctx.roundRect(lx, legendY, bw, bh, 3);
    ctx.fill();
    ctx.strokeStyle = item.border;
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = C.tan;
    ctx.font = `400 ${10}px 'DM Sans', sans-serif`;
    ctx.textAlign = 'left';
    ctx.fillText(item.label, lx + 18, legendY + 11);
    lx += 88;
  });

  // ── Bottom gold line ──
  ctx.fillStyle = C.gold;
  ctx.fillRect(PAD, H - 22, W - PAD*2, 1);

  // ── Footer ──
  ctx.fillStyle = 'rgba(200,185,165,0.35)';
  ctx.font = `400 ${10}px 'DM Sans', sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('VOICESCORE · dustinlamia.github.io/golf-scorecard', W/2, H - 8);

  // ── Download ──
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'scorecard-' + new Date().toISOString().slice(0,10) + '.png';
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  }, 'image/png');
}

function confirmReset(){
  if(confirm('Start a new round? Current scores will be lost.')){
    isListening=false;
    if(recognition){recognition._killed=true;try{recognition.stop();}catch(e){}}
    selectedCourse=null;selectedTee=null;
    clearState();
    document.getElementById('scorecard-screen').style.display='none';
    document.getElementById('setup-screen').style.display='block';
    document.getElementById('course-results').innerHTML='';
    document.getElementById('course-input').value='';
    document.getElementById('search-status').textContent='';
    document.getElementById('tee-section').style.display='none';
    document.getElementById('selected-badge').style.display='none';
    document.getElementById('course-banner').style.display='none';
  }
}

// Restore session on page load
window.addEventListener('DOMContentLoaded',()=>{ restoreState(); });
</script>
